# Customer Success Digital FTE - Docker Compose
# Complete development and staging environment

version: '3.8'

services:
  # ============================================================================
  # PostgreSQL Database
  # ============================================================================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: fte-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${APP_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${APP_DB_PASSWORD:-postgres}
      POSTGRES_DB: ${APP_DB_NAME:-customer_success_fte}
    ports:
      - "${APP_DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${APP_DB_USER:-postgres} -d ${APP_DB_NAME:-customer_success_fte}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fte-network

  # ============================================================================
  # Zookeeper (Kafka dependency)
  # ============================================================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: fte-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_INIT_LIMIT: 5
      ZOOKEEPER_SYNC_LIMIT: 2
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fte-network

  # ============================================================================
  # Kafka Message Broker
  # ============================================================================
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: fte-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:${KAFKA_PORT:-9092}
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_RETENTION_BYTES: 1073741824
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - fte-network

  # ============================================================================
  # Kafka UI (Optional - for development)
  # ============================================================================
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: fte-kafka-ui
    restart: unless-stopped
    depends_on:
      - kafka
    ports:
      - "${KAFKA_UI_PORT:-8080}:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: fte-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    networks:
      - fte-network
    profiles:
      - with-ui

  # ============================================================================
  # FastAPI Application
  # ============================================================================
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: ${DOCKER_TARGET:-production}
    container_name: fte-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      # Application
      APP_APP_ENV: ${APP_APP_ENV:-development}
      APP_APP_DEBUG: ${APP_APP_DEBUG:-true}
      APP_APP_HOST: 0.0.0.0
      APP_APP_PORT: 8000

      # Database
      APP_DB_HOST: postgres
      APP_DB_PORT: 5432
      APP_DB_NAME: ${APP_DB_NAME:-customer_success_fte}
      APP_DB_USER: ${APP_DB_USER:-postgres}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:-postgres}
      APP_DB_SSL_MODE: disable
      APP_DB_MIN_CONNECTIONS: ${APP_DB_MIN_CONNECTIONS:-5}
      APP_DB_MAX_CONNECTIONS: ${APP_DB_MAX_CONNECTIONS:-20}

      # Kafka
      APP_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      APP_KAFKA_TOPIC_INBOUND: fte.tickets.incoming
      APP_KAFKA_TOPIC_OUTBOUND: fte.tickets.outgoing
      APP_KAFKA_TOPIC_EVENTS: fte.agent.events
      APP_KAFKA_CONSUMER_GROUP_ID: digital_fte_worker

      # OpenAI
      APP_OPENAI_API_KEY: ${APP_OPENAI_API_KEY:-}
      APP_OPENAI_MODEL: ${APP_OPENAI_MODEL:-gpt-4}
      APP_OPENAI_EMBEDDING_MODEL: ${APP_OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}

      # Gmail API
      APP_GMAIL_CLIENT_ID: ${APP_GMAIL_CLIENT_ID:-}
      APP_GMAIL_CLIENT_SECRET: ${APP_GMAIL_CLIENT_SECRET:-}
      APP_GMAIL_REDIRECT_URI: ${APP_GMAIL_REDIRECT_URI:-}
      APP_GMAIL_REFRESH_TOKEN: ${APP_GMAIL_REFRESH_TOKEN:-}

      # Twilio
      APP_TWILIO_ACCOUNT_SID: ${APP_TWILIO_ACCOUNT_SID:-}
      APP_TWILIO_AUTH_TOKEN: ${APP_TWILIO_AUTH_TOKEN:-}
      APP_TWILIO_WHATSAPP_NUMBER: ${APP_TWILIO_WHATSAPP_NUMBER:-}

      # Security
      APP_SECRET_KEY: ${APP_SECRET_KEY:-change-me-in-production}
      APP_CORS_ORIGINS: ${APP_CORS_ORIGINS:-http://localhost:3000,http://localhost:8000}

      # Logging
      APP_LOG_LEVEL: ${APP_LOG_LEVEL:-INFO}
      APP_LOG_FORMAT: ${APP_LOG_FORMAT:-text}

      # Features
      APP_ENABLE_SENTIMENT_ANALYSIS: ${APP_ENABLE_SENTIMENT_ANALYSIS:-true}
      APP_ENABLE_AUTO_ESCALATION: ${APP_ENABLE_AUTO_ESCALATION:-true}
      APP_ENABLE_KNOWLEDGE_BASE_LEARNING: ${APP_ENABLE_KNOWLEDGE_BASE_LEARNING:-true}
      APP_ENABLE_METRICS_COLLECTION: ${APP_ENABLE_METRICS_COLLECTION:-true}
    volumes:
      - ./backend/logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - fte-network

  # ============================================================================
  # Kafka Worker (Message Processor)
  # ============================================================================
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
      target: ${DOCKER_TARGET:-production}
    container_name: fte-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      # Application
      APP_APP_ENV: ${APP_APP_ENV:-development}

      # Database
      APP_DB_HOST: postgres
      APP_DB_PORT: 5432
      APP_DB_NAME: ${APP_DB_NAME:-customer_success_fte}
      APP_DB_USER: ${APP_DB_USER:-postgres}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:-postgres}
      APP_DB_SSL_MODE: disable
      APP_DB_MIN_CONNECTIONS: ${APP_DB_MIN_CONNECTIONS:-5}
      APP_DB_MAX_CONNECTIONS: ${APP_DB_MAX_CONNECTIONS:-20}

      # Kafka
      APP_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      APP_KAFKA_TOPIC_INBOUND: fte.tickets.incoming
      APP_KAFKA_TOPIC_OUTBOUND: fte.tickets.outgoing
      APP_KAFKA_TOPIC_EVENTS: fte.agent.events
      APP_KAFKA_CONSUMER_GROUP_ID: digital_fte_worker
      APP_KAFKA_AUTO_OFFSET_RESET: earliest

      # OpenAI
      APP_OPENAI_API_KEY: ${APP_OPENAI_API_KEY:-}
      APP_OPENAI_MODEL: ${APP_OPENAI_MODEL:-gpt-4}

      # Twilio
      APP_TWILIO_AUTH_TOKEN: ${APP_TWILIO_AUTH_TOKEN:-}

      # Logging
      APP_LOG_LEVEL: ${APP_LOG_LEVEL:-INFO}
      APP_LOG_FORMAT: ${APP_LOG_FORMAT:-json}
    volumes:
      - ./backend/logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h postgres -U ${APP_DB_USER:-postgres}"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - fte-network

  # ============================================================================
  # Lifecycle Scheduler (Optional - for periodic tasks)
  # ============================================================================
  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
      target: ${DOCKER_TARGET:-production}
    container_name: fte-scheduler
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      # Database
      APP_DB_HOST: postgres
      APP_DB_PORT: 5432
      APP_DB_NAME: ${APP_DB_NAME:-customer_success_fte}
      APP_DB_USER: ${APP_DB_USER:-postgres}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:-postgres}

      # Kafka
      APP_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      APP_KAFKA_TOPIC_EVENTS: fte.agent.events

      # Logging
      APP_LOG_LEVEL: ${APP_LOG_LEVEL:-INFO}
    command: ["python", "-c", "from src.services.scheduler import run_scheduler; import asyncio; asyncio.run(run_scheduler())"]
    networks:
      - fte-network
    profiles:
      - with-scheduler

# ============================================================================
# Networks
# ============================================================================
networks:
  fte-network:
    driver: bridge
    name: fte-network

# ============================================================================
# Volumes
# ============================================================================
volumes:
  postgres_data:
    name: fte-postgres-data
  zookeeper_data:
    name: fte-zookeeper-data
  kafka_data:
    name: fte-kafka-data
